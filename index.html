<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Trang truy cập nhanh Báo cáo kiểm tra">
    <title>BÁO CÁO KIỂM TRA - GIÁM SÁT</title>
    <meta name="theme-color" content="#a8edea">
    <meta name="apple-mobile-web-app-title" content="BÁO CÁO KIỂM TRA - GIÁM SÁT">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="manifest.json">
    <script src="pwa-core.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #eef2f3 0%, #8e9eab 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #ffffff;
            padding: 32px 24px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            width: 100%;
            max-width: 460px;
            text-align: center;
            transition: all 0.2s ease;
        }

        h1 {
            margin: 0 0 8px 0;
            color: #1F74AD;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.2px;
        }

        .report-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px 12px;
            margin-bottom: 16px;
            background: #3498db;
            color: #ffffff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px rgba(52, 152, 219, 0.2);
            border: none;
            cursor: pointer;
            text-align: center;
        }

        .link-main {
            font-size: 25px;
            font-weight: 600;
            letter-spacing: 0.3px;
            line-height: 1.3;
            margin-bottom: 6px;
        }

        .link-desc {
            font-size: 14px;
            font-weight: 400;
            line-height: 1.35;
            opacity: 0.92;
            max-width: 100%;
            white-space: normal;
            word-break: break-word;
        }

        .report-link:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(52, 152, 219, 0.35);
        }

        .report-link:active {
            transform: translateY(1px);
        }

        .note {
            margin-top: 20px;
            font-size: 13px;
            color: #1F74AD;
            background: rgba(31, 116, 173, 0.08);
            display: inline-block;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 500;
        }

        .icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .page-icon {
            width: 110px;
            height: 110px;
            object-fit: contain;
            filter: drop-shadow(0 6px 8px rgba(0, 70, 40, 0.15));
            transition: transform 0.2s;
        }

        .admin-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 14px;
            padding: 8px 20px;
            background: transparent;
            color: #7f8c8d;
            text-decoration: none;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            border: 1.5px solid #c8d0d6;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .admin-link:hover {
            background: #f0f3f5;
            color: #555e63;
            border-color: #aab4bb;
        }

        .admin-icon {
            font-size: 14px;
        }

        /* Responsive nhỏ - ĐÃ SỬA LỖI THIẾU DẤU {} */
        @media (max-width: 480px) {
            .container {
                padding: 24px 18px;
            }
            h1 {
                font-size: 18px;
            }
            .link-main {
                font-size: 20px;
            }
            .link-desc {
                font-size: 11px;
            }
            .note {
                font-size: 12px;
            }
            .page-icon {
                width: 120px;
                height: 120px;
                object-fit: contain;
                filter: drop-shadow(0 6px 8px rgba(0,70,40,0.2));
            }
        }

        /* Thêm responsive cho tablet */
        @media (min-width: 481px) and (max-width: 1024px) {
            .container {
                max-width: 600px;
                padding: 40px 32px;
            }
            h1 {
                font-size: 28px;
            }
            .link-main {
                font-size: 28px;
            }
            .page-icon {
                width: 140px;
                height: 140px;
            }
        }
    </style>
</head>
<body>
    <!-- Splash Screen - Màn hình chờ khi tải -->
    <div id="splash" style="position:fixed;inset:0;z-index:999999;background:linear-gradient(135deg,#eef2f3 0%,#8e9eab 100%);display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity 0.8s ease;">
        <img src="icon-1000.png" alt="Logo" style="width:150px;height:150px;object-fit:contain;animation:pulse 1.5s ease-in-out infinite;">
        <h2 style="color:#1F74AD;margin-top:20px;font-size:24px;font-weight:600;">Đang tải...</h2>
        <style>
            @keyframes pulse {
                0%, 100% { transform: scale(1); opacity: 1; }
                50% { transform: scale(1.05); opacity: 0.7; }
            }
        </style>
    </div>

    <div class="container">
        <div class="icon-wrapper">
            <img src="icon.png" alt="Logo" class="page-icon" onerror="this.style.display='none'; this.parentElement.innerHTML='<span style=font-size:3.2rem;>📊</span>';">
        </div>
        <h1>BÁO CÁO KIỂM TRA - GIÁM SÁT<br>THI HÀNH KỶ LUẬT CỦA ĐẢNG</h1>

        <a href="Mau01.html" class="report-link">
            <span class="link-main">Mẫu 01</span>
            <span class="link-desc">Kiểm tra · Giám sát · Thi hành kỷ luật Đảng</span>
        </a>

        <a href="Mau02.html" class="report-link">
            <span class="link-main">Mẫu 02</span>
            <span class="link-desc">Tổng hợp kết quả, phương hướng nhiệm vụ</span>
        </a>

        <p class="note">Nhấn trực tiếp vào nút để mở tệp báo cáo</p>

        <a href="admin.html" class="admin-link">
            <span class="admin-icon">⚙️</span> Truy cập quản trị
        </a>
    </div>
</body>
</html>
